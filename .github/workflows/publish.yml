name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"                         # triggers on v0.1.1, v0.2.0, v1.0.0 etc.

jobs:
  publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write                    # Trusted Publishing — no API key needed!
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install build tools
        run: pip install build

      - name: Build wheel + sdist
        run: python -m build              # outputs to dist/

      - name: Verify distribution
        run: |
          pip install twine
          twine check dist/*             # catches malformed packages early

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No token needed — uses OIDC Trusted Publishing
        # Set it up once on pypi.org: Publishing → Trusted Publisher