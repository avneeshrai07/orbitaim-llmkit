name: Auto Version Bump

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "pyproject.toml"       # prevent infinite loop
      - "CHANGELOG.md"
      - "src/**/__init__.py"

jobs:
  bump:
    name: Bump patch version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          python - <<'EOF'
          import re, subprocess

          # ── Read current version from pyproject.toml ──────────
          with open("pyproject.toml", "r") as f:
              content = f.read()

          match = re.search(r'^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', content, re.MULTILINE)
          if not match:
              raise ValueError("Could not find version in pyproject.toml")

          major, minor, patch = int(match.group(1)), int(match.group(2)), int(match.group(3))
          old_version = f"{major}.{minor}.{patch}"

          # ── Increment with carry-over logic ───────────────────
          # 0.0.8 → 0.0.9 → 0.1.0 → ... → 0.9.9 → 1.0.0
          patch += 1
          if patch > 9:
              patch = 0
              minor += 1
          if minor > 9:
              minor = 0
              major += 1

          new_version = f"{major}.{minor}.{patch}"
          print(f"Bumping: {old_version} → {new_version}")

          # ── Update pyproject.toml ──────────────────────────────
          new_content = re.sub(
              r'^(version\s*=\s*)"[\d\.]+"',
              f'\\1"{new_version}"',
              content,
              flags=re.MULTILINE,
          )
          with open("pyproject.toml", "w") as f:
              f.write(new_content)

          # ── Update __init__.py ─────────────────────────────────
          import glob
          for init_file in glob.glob("src/**/__init__.py", recursive=True):
              with open(init_file, "r") as f:
                  init_content = f.read()
              if "__version__" in init_content:
                  new_init = re.sub(
                      r'^(__version__\s*=\s*)"[\d\.]+"',
                      f'\\1"{new_version}"',
                      init_content,
                      flags=re.MULTILINE,
                  )
                  with open(init_file, "w") as f:
                      f.write(new_init)
                  print(f"Updated {init_file}")

          # ── Write new version to GitHub output ────────────────
          with open("/tmp/new_version.txt", "w") as f:
              f.write(new_version)

          EOF

          echo "new_version=$(cat /tmp/new_version.txt)" >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          NEW_VERSION=${{ steps.bump.outputs.new_version }}
          git add pyproject.toml src/
          git commit -m "bump: version → $NEW_VERSION"
          git tag "v$NEW_VERSION"

      - name: Push commit + tag
        run: git push --follow-tags